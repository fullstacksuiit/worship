{% extends "base.html" %}
{% block title %}{{ title }} · {{ current_org.name }}{% endblock %}
{% block content %}
<div class="mx-auto max-w-xl">
  <div class="mb-6">
    <a href="{{ cancel_url }}" class="inline-flex items-center gap-1 text-sm font-medium text-slate-500 transition hover:text-slate-700">
      <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      Cancel
    </a>
  </div>

  <div class="rounded-2xl border border-rose-200 bg-white p-8 shadow-soft">
    <div class="flex items-start gap-4">
      <span class="flex h-12 w-12 shrink-0 items-center justify-center rounded-full bg-rose-50 text-rose-600">
        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M5.07 19h13.86a2 2 0 001.74-2.99L13.73 4a2 2 0 00-3.46 0L3.33 16.01A2 2 0 005.07 19z"/></svg>
      </span>
      <div class="min-w-0">
        <h1 class="text-xl font-bold tracking-tight text-slate-900">{{ title }}</h1>
        <p class="mt-2 text-sm text-slate-600">{{ message }}</p>
        {% if consequences %}
        <ul class="mt-4 list-disc space-y-1.5 pl-5 text-sm text-slate-500">
          {% for c in consequences %}<li>{{ c }}</li>{% endfor %}
        </ul>
        {% endif %}
      </div>
    </div>

    <form method="post" class="mt-8 flex items-center justify-end gap-3 border-t border-slate-100 pt-6">
      {% csrf_token %}
      <a href="{{ cancel_url }}" class="text-sm font-medium text-slate-500 transition hover:text-slate-700">Cancel</a>
      <button type="submit"
              class="inline-flex items-center gap-2 rounded-xl bg-gradient-to-br from-rose-500 to-rose-600 px-5 py-2.5 text-sm font-semibold text-white shadow-soft ring-1 ring-rose-700/10 transition hover:-translate-y-0.5 hover:shadow-lg">
        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
        {{ confirm_label|default:"Delete" }}
      </button>
    </form>
  </div>
</div>
{% endblock %}
