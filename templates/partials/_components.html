{% comment %}
The component layer — the vocabulary every page is written in.

Buttons, cards, badges, tables, nav links and empty states are defined once
here so a page template says *what* it is showing, not how it looks.
{% endcomment %}
<style type="text/tailwindcss">
  @layer base {
    body { -webkit-tap-highlight-color: transparent; }
    /* Headings carry the display face by default; `font-display` in markup
       opts anything else in. (It can't be listed here — a utility can't
       `@apply` itself.) */
    h1, h2, h3 { @apply font-display tracking-[-0.02em]; }
    .font-display { letter-spacing: -0.02em; }
    ::selection { @apply bg-clay-500/20; }

    /* The page itself is warm paper, lit from the top corners. */
    .bg-app {
      background-color: #fbf8f4;
      background-image:
        radial-gradient(60rem 34rem at 12% -12%, rgba(209,139,42,.10), transparent 60%),
        radial-gradient(52rem 30rem at 105% 0%, rgba(42,149,131,.10), transparent 62%);
      background-attachment: fixed;
    }

    /* A grid item's `min-width` is `auto`, so one `truncate` (i.e. nowrap)
       child inside it can push its whole column wider than the phone screen.
       Nothing in this app ever wants that — a column should shrink and let the
       text ellipsize. */
    .grid > * { min-width: 0; }

    /* `hidden` means hidden. Without this a `display:` utility on the same
       element — `grid`, `flex` — quietly wins over the attribute, and a row
       the page meant to hide stays on screen. */
    [hidden] { display: none !important; }

    /* Warm, slim scrollbars. */
    * { scrollbar-color: #dbc2a4 transparent; scrollbar-width: thin; }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { @apply rounded-full border-4 border-solid border-transparent bg-sand-300 bg-clip-content; }
  }

  @layer components {
    /* ---- Buttons ------------------------------------------------------- */
    .btn {
      @apply inline-flex select-none items-center justify-center gap-2 whitespace-nowrap
             rounded-xl px-4 py-2.5 text-sm font-semibold transition
             focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-clay-500/25
             active:translate-y-px disabled:pointer-events-none disabled:opacity-50;
    }
    .btn-primary {
      @apply bg-gradient-to-b from-sand-700 to-sand-800 text-white shadow-soft
             hover:from-sand-600 hover:to-sand-700;
    }
    .btn-accent {
      @apply bg-gradient-to-b from-clay-500 to-clay-700 text-white shadow-soft
             hover:from-clay-400 hover:to-clay-600;
    }
    .btn-ghost {
      @apply border border-sand-200 bg-white/80 text-sand-800 shadow-sm
             hover:border-sand-300 hover:bg-white;
    }
    .btn-quiet { @apply text-sand-700 hover:bg-sand-100/80; }
    .btn-danger {
      @apply bg-gradient-to-b from-red-500 to-red-600 text-white shadow-soft hover:from-red-400 hover:to-red-500;
    }
    .btn-danger-ghost { @apply border border-red-200 bg-white/80 text-red-600 hover:bg-red-50; }
    .btn-sm { @apply rounded-lg px-3 py-1.5 text-[0.8rem]; }
    .btn-lg { @apply rounded-2xl px-5 py-3 text-base; }

    /* ---- Surfaces ------------------------------------------------------ */
    .card { @apply rounded-2xl border border-sand-200/80 bg-white shadow-soft; }
    .card-pad { @apply p-5 sm:p-6; }
    .card-link {
      @apply block rounded-2xl border border-sand-200/80 bg-white shadow-soft transition
             hover:-translate-y-0.5 hover:border-sand-300 hover:shadow-lift;
    }
    .panel { @apply rounded-2xl border border-sand-200/70 bg-sand-50/70 p-4; }

    /* ---- Badges & chips ------------------------------------------------ */
    .badge {
      @apply inline-flex items-center gap-1 rounded-full px-2.5 py-0.5 text-xs font-semibold;
    }
    .badge-neutral { @apply bg-sand-100 text-sand-600; }
    .badge-accent  { @apply bg-clay-500/12 text-clay-700; }
    .badge-gold    { @apply bg-gold-100 text-gold-800; }
    .badge-danger  { @apply bg-red-50 text-red-600; }

    /* Filter chips — the selected one is a solid pill. */
    .chip {
      @apply inline-flex items-center gap-1.5 rounded-full border border-sand-200 bg-white/80
             px-3.5 py-1.5 text-sm font-medium text-sand-700 transition hover:border-sand-300 hover:bg-white;
    }
    .chip-on { @apply border-transparent bg-sand-800 text-white hover:bg-sand-700; }

    /* ---- Emblems — the emoji tiles that carry the app's identity -------- */
    .emblem {
      @apply flex shrink-0 items-center justify-center rounded-2xl border border-sand-200/80
             bg-gradient-to-b from-white to-sand-100 shadow-sm;
    }
    .emblem-sm { @apply h-9 w-9 rounded-xl text-lg; }
    .emblem-md { @apply h-12 w-12 text-2xl; }
    .emblem-lg { @apply h-16 w-16 text-3xl; }

    /* ---- Tables -------------------------------------------------------- */
    .table-wrap { @apply overflow-x-auto rounded-2xl border border-sand-200/80 bg-white shadow-soft; }
    .table { @apply w-full min-w-[34rem] text-sm; }
    .table thead { @apply border-b border-sand-200 bg-sand-50/80; }
    .table th {
      @apply px-4 py-3 text-left text-[0.7rem] font-semibold uppercase tracking-wider text-sand-500;
    }
    .table td { @apply px-4 py-3.5 align-middle; }
    .table tbody tr { @apply border-b border-sand-100 transition last:border-0 hover:bg-sand-50/70; }

    /* ---- Navigation ---------------------------------------------------- */
    .nav-link {
      @apply relative flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium
             text-sand-700 transition hover:bg-sand-100/80 hover:text-sand-900;
    }
    .nav-link-on {
      @apply bg-white text-sand-900 shadow-soft ring-1 ring-sand-200/80;
    }
    .nav-link-on::before {
      content: "";
      @apply absolute inset-y-2 -left-2 w-1 rounded-full bg-clay-500;
    }
    .tab-link {
      @apply flex flex-1 flex-col items-center gap-0.5 rounded-xl px-1 py-1.5
             text-[0.65rem] font-semibold text-sand-500 transition;
    }
    .tab-link-on { @apply bg-sand-100 text-sand-900; }

    /* ---- Page furniture ------------------------------------------------ */
    .page-title { @apply text-2xl font-bold text-sand-900 sm:text-[1.75rem]; }
    .page-sub { @apply mt-1 text-sm text-sand-600 empty:hidden; }
    .section-title { @apply mb-3 flex items-center gap-2 text-base font-bold text-sand-800; }
    .back-link {
      @apply inline-flex items-center gap-1.5 text-sm font-medium text-sand-600
             transition hover:text-clay-700;
    }
    .link { @apply font-medium text-clay-700 underline-offset-2 hover:underline; }
    .empty {
      @apply flex flex-col items-center rounded-2xl border border-dashed border-sand-300
             bg-white/70 px-6 py-12 text-center;
    }
    .kv-key { @apply text-xs font-medium uppercase tracking-wide text-sand-500; }
    .kv-val { @apply mt-1 font-medium text-sand-900; }
    .money-in { @apply font-semibold text-clay-700; }
    .money-out { @apply font-semibold text-red-600; }

    /* ---- The second language ------------------------------------------- */
    /* The place's own word, sitting beside the English one. Lighter, so the
       pair reads as one label rather than two competing ones — and isolated,
       so an Urdu or Hebrew word can sit inside an English line without
       dragging the punctuation around it to the wrong side. */
    /* The gap is physical, not logical: `ms-` would resolve against the word's
       own direction and put an Urdu word's space on its right, where the
       English word isn't. */
    .native {
      @apply ml-1.5 font-native text-[0.92em] font-medium text-sand-500;
      unicode-bidi: isolate;
    }
    /* Nastaliq hangs well below its baseline; a touch smaller and roomier keeps
       it from colliding with the line under it. */
    .native:lang(ur) { @apply text-[0.85em] leading-[1.9]; }
    /* On a heading the second word is a peer, not a footnote. */
    .page-title .native, .native-strong { @apply text-sand-400; }
    /* Stacked instead of inline — nav rows, tiles, anywhere vertical space is
       cheaper than horizontal. Left-aligned even for a right-to-left word: it
       belongs under the English label it repeats, not out at the far margin. */
    .native-block { @apply ml-0 block truncate text-left text-[0.95em] leading-snug; }

    /* ---- Category box -------------------------------------------------- */
    /* The app's own suggestion list. A native <datalist> is drawn by the
       browser — black panel, no styling possible — so the list is real markup. */
    .combo { @apply relative; }
    .combo-toggle {
      @apply absolute right-3 top-1/2 flex h-5 w-5 -translate-y-1/2 items-center
             justify-center text-sand-400 transition hover:text-sand-700;
    }
    .combo-list {
      @apply absolute inset-x-0 top-full z-30 mt-1.5 max-h-56 space-y-0.5 overflow-y-auto
             rounded-xl border border-sand-200 bg-white p-1.5 shadow-lift;
    }
    .combo-option {
      @apply cursor-pointer rounded-lg px-3 py-2 text-sm font-medium text-sand-700 transition;
    }
    .combo-option:hover, .combo-option[data-active] { @apply bg-sand-100 text-sand-900; }

    /* Pick-one tiles — a choice you can see, instead of a dropdown you can't.
       Used for the tradition at sign-up; the radio itself stays keyboard-focusable. */
    .pick-tile {
      @apply flex cursor-pointer items-center gap-3 rounded-2xl border border-sand-200
             bg-white/80 px-3.5 py-3 text-left transition
             hover:border-sand-300 hover:bg-white
             peer-checked:border-clay-500 peer-checked:bg-clay-500/8 peer-checked:shadow-soft
             peer-focus-visible:ring-2 peer-focus-visible:ring-clay-500/40;
    }
    .pick-tile-title { @apply block text-sm font-bold leading-tight text-sand-900; }
    .pick-tile-sub { @apply mt-0.5 block text-xs text-sand-500; }

    /* The same idea standing up: a taller tile for a choice that needs a line
       of explanation under it, like how a property is rented out. */
    .choice-card {
      @apply block cursor-pointer rounded-2xl border border-sand-200 bg-white/80 p-4
             text-left transition hover:border-sand-300 hover:bg-white
             peer-checked:border-clay-500 peer-checked:bg-clay-500/8 peer-checked:shadow-soft
             peer-focus-visible:ring-2 peer-focus-visible:ring-clay-500/40;
    }

    .skip-link {
      @apply sr-only focus:not-sr-only focus:fixed focus:left-4 focus:top-4 focus:z-[60]
             focus:rounded-xl focus:bg-sand-900 focus:px-4 focus:py-2 focus:text-sm focus:text-white;
    }
  }
</style>
