{% comment %}
The shared "are you sure?" card for every destructive action.
Params: heading, note, cancel_url, confirm_label (optional).
{% endcomment %}
<div class="card card-pad animate-rise text-center">
  <div class="mx-auto flex h-14 w-14 items-center justify-center rounded-2xl bg-red-50 text-3xl">🗑️</div>
  <h1 class="mt-4 text-xl font-bold">{{ heading }}</h1>
  {% if note %}<p class="mt-2 text-sm leading-relaxed text-sand-600">{{ note }}</p>{% endif %}
  <p class="mt-1 text-sm font-medium text-red-600">This can't be undone.</p>

  <form method="post" class="mt-7 flex flex-col-reverse gap-3 sm:flex-row sm:justify-center">
    {% csrf_token %}
    <a href="{{ cancel_url }}" class="btn btn-ghost">Keep it</a>
    <button type="submit" class="btn btn-danger">{{ confirm_label|default:"Yes, remove" }}</button>
  </form>
</div>
