{% comment %}
One row in a plan's feature list.
  on    – truthy if the plan includes this feature (check vs. muted dash)
  label – feature text
{% endcomment %}
<li class="flex items-center gap-2 {% if on %}text-slate-700{% else %}text-slate-400 line-through{% endif %}">
  {% if on %}
    <svg class="h-4 w-4 flex-none text-{{ branding.accent }}-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
  {% else %}
    <svg class="h-4 w-4 flex-none text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
  {% endif %}
  {{ label }}
</li>
