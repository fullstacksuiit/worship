{% comment %}
Reusable nav link with active-state styling.
  label  – text to show
  url    – url name, e.g. "donations:dashboard"
  match  – path fragment marking the section active (empty → match the exact view)
  block  – truthy for the full-width mobile variant
{% endcomment %}
<a href="{% url url %}"
   class="{% if block %}block {% endif %}rounded-lg px-3 py-2 text-sm font-medium transition {% if match and match in request.path or not match and request.resolver_match.view_name == url %}bg-{{ branding.accent }}-50 text-{{ branding.accent }}-700{% else %}text-slate-600 hover:bg-slate-100 hover:text-slate-900{% endif %}">
  {{ label }}
</a>
